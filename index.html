<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PacBada Mobile</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#000; position:fixed; top:0; left:0; }
        #unity-container { width:100vw; height:100vh; background:#000; display:flex; justify-content:center; align-items:center; position:fixed; top:0; left:0; }
        #unity-canvas { background:#000; display:block; transform:translateY(0px); }
        #loading-area { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); color:#fff; font-family:Arial,sans-serif; z-index:20; text-align:center; width:80%; max-width:400px; }
        #progress-bg { width:100%; height:6px; background:#333; border-radius:3px; margin:12px 0 0; }
        #progress-fill { width:0%; height:100%; background:#00ccff; border-radius:3px; }
        #error-msg { color:#ff5555; font-size:14px; margin-top:20px; word-break:break-all; display:none; }
        #rotate-tip { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:#fff; font-size:24px; display:none; justify-content:center; align-items:center; z-index:9999; flex-direction:column; text-align:center; font-family:Arial,sans-serif; }
        #rotate-tip span { font-size:16px; color:#aaa; margin-top:10px; }
        @media (orientation:portrait) { #rotate-tip { display:flex !important; } }
        @media (orientation:landscape) { #rotate-tip { display:none !important; } }

        /* 透明拦截层 */
        #click-catcher {
            position:absolute;
            top:0; left:0;
            width:100%; height:100%;
            z-index:10;
            background:transparent;
            touch-action:none;
            display:block;
        }
    </style>
</head>
<body>

    <div id="rotate-tip">📱⤵️Please rotate your phone<span>（Automatically enter after rotating the phone）</span></div>
    <div id="loading-area">
        <div id="loading-status">加载中...</div>
        <div id="progress-bg"><div id="progress-fill"></div></div>
        <div id="error-msg"></div>
    </div>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="click-catcher"></div>
    </div>

    <script>
        // =========================================================
        // ★ 手动调整垂直偏移（正数下移，负数上移） ★
        var VERTICAL_OFFSET = 0;

        // =========================================================
        // 文件路径配置
        var buildFiles = {
            loaderUrl: "Build/PacbadaWebMobileFinal.loader.js",
            frameworkUrl: "Build/PacbadaWebMobileFinal.framework.js",
            dataUrl: "Build/PacbadaWebMobileFinal.data",
            wasmUrl: "Build/PacbadaWebMobileFinal.wasm",
        };

        var canvas = document.getElementById("unity-canvas");
        var catcher = document.getElementById("click-catcher");
        var GAME_W = 1280;
        var GAME_H = 720;
        var GAME_RATIO = GAME_W / GAME_H;
        var dpr = window.devicePixelRatio || 1;
        var unityInstance = null;
        var rafId = null;
        var audioCtx = null;
        var keepAliveInterval = null;

        // =========================================================
        // ★ 核心适配函数（每帧调用）+ 音频上下文恢复
        function fitCanvas() {
            if (!canvas) return;
            var screenW = document.documentElement.clientWidth;
            var screenH = document.documentElement.clientHeight;
            if (screenW === 0 || screenH === 0) return;

            var screenRatio = screenW / screenH;
            var displayW, displayH;
            if (screenRatio > GAME_RATIO) {
                displayH = screenH;
                displayW = screenH * GAME_RATIO;
            } else {
                displayW = screenW;
                displayH = screenW / GAME_RATIO;
            }
            displayW = Math.round(displayW);
            displayH = Math.round(displayH);

            if (canvas.style.width !== displayW + 'px') {
                canvas.style.width = displayW + 'px';
            }
            if (canvas.style.height !== displayH + 'px') {
                canvas.style.height = displayH + 'px';
            }
            canvas.style.background = '#000';
            canvas.style.transform = 'translateY(' + VERTICAL_OFFSET + 'px)';

            var realW = displayW * dpr;
            var realH = displayH * dpr;
            if (canvas.width !== realW || canvas.height !== realH) {
                canvas.width = realW;
                canvas.height = realH;
            }

            if (unityInstance && typeof unityInstance.SetResolution === 'function') {
                unityInstance.SetResolution(canvas.width, canvas.height);
            }

            // 每帧尝试恢复 Unity 的音频上下文
            if (audioCtx && typeof audioCtx.resume === 'function') {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(function() {});
                }
            }
        }

        window.refreshGameCanvas = function() {
            dpr = window.devicePixelRatio || 1;
            fitCanvas();
            window.dispatchEvent(new Event('resize'));
        };

        function startRafLoop() {
            if (rafId) return;
            function loop() {
                fitCanvas();
                rafId = requestAnimationFrame(loop);
            }
            loop();
            console.log('▶️ RAF 循环已启动');
        }

        // =========================================================
        // ★ 音频保活
        function startAudioKeepAlive() {
            if (keepAliveInterval) return;
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (!ctx) return;
                if (ctx.state === 'suspended') {
                    ctx.resume().catch(function() {});
                }
                keepAliveInterval = setInterval(function() {
                    if (!ctx || ctx.state !== 'running') {
                        if (ctx && ctx.state === 'suspended') {
                            ctx.resume().catch(function() {});
                        }
                        return;
                    }
                    try {
                        var osc = ctx.createOscillator();
                        var gain = ctx.createGain();
                        gain.gain.value = 0.001;
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(0);
                        osc.stop(0.005);
                    } catch(e) {}
                }, 150);
                if (!audioCtx) audioCtx = ctx;
                console.log('🎵 音频保活已启动');
            } catch(e) {
                console.warn('音频保活启动失败:', e);
            }
        }

        function findUnityAudioContext() {
            if (!unityInstance) return;
            var module = unityInstance.Module;
            if (!module) return;
            var candidates = ['webaudioContext', 'audioContext', 'audio', 'context', 'ctx'];
            for (var i=0; i<candidates.length; i++) {
                try {
                    var obj = module[candidates[i]];
                    if (obj && typeof obj.resume === 'function') {
                        audioCtx = obj;
                        console.log('✅ 找到 Unity 音频上下文:', candidates[i]);
                        return;
                    }
                } catch(e) {}
            }
            for (var key in module) {
                try {
                    var val = module[key];
                    if (val && typeof val === 'object' && typeof val.resume === 'function' &&
                        (key.toLowerCase().indexOf('audio') !== -1 || key.toLowerCase().indexOf('context') !== -1)) {
                        audioCtx = val;
                        console.log('✅ 找到 Unity 音频上下文 (属性:', key, ')');
                        return;
                    }
                } catch(e) {}
            }
            console.log('⚠️ 未找到 Unity 音频上下文');
        }

        // =========================================================
        // ★ 模拟完整点击事件（pointerdown + pointerup + click）
        function simulateClick(target, clientX, clientY) {
            if (!target) return;
            // 创建 PointerEvent（如果浏览器支持）
            try {
                var pointerDown = new PointerEvent('pointerdown', {
                    bubbles: true,
                    cancelable: true,
                    view: window,
                    clientX: clientX,
                    clientY: clientY,
                    pointerId: 1,
                    pointerType: 'touch',
                    isPrimary: true
                });
                target.dispatchEvent(pointerDown);
            } catch(e) {
                // 降级为 MouseEvent
                var ev = new MouseEvent('mousedown', { bubbles: true, cancelable: true, view: window, clientX: clientX, clientY: clientY });
                target.dispatchEvent(ev);
            }

            // 短延迟后触发 pointerup 和 click
            setTimeout(function() {
                try {
                    var pointerUp = new PointerEvent('pointerup', {
                        bubbles: true,
                        cancelable: true,
                        view: window,
                        clientX: clientX,
                        clientY: clientY,
                        pointerId: 1,
                        pointerType: 'touch',
                        isPrimary: true
                    });
                    target.dispatchEvent(pointerUp);
                } catch(e) {
                    var ev2 = new MouseEvent('mouseup', { bubbles: true, cancelable: true, view: window, clientX: clientX, clientY: clientY });
                    target.dispatchEvent(ev2);
                }
                // click 事件
                try {
                    var clickEv = new MouseEvent('click', { bubbles: true, cancelable: true, view: window, clientX: clientX, clientY: clientY });
                    target.dispatchEvent(clickEv);
                } catch(e) {}
                console.log('📤 模拟点击完成');
            }, 30);
        }

        // ★ 用户交互处理（拦截层）
        function setupUserInteraction() {
            if (!catcher) {
                console.warn('⚠️ 拦截层不存在');
                return;
            }
            var handler = function(e) {
                e.preventDefault();
                console.log('👆 用户点击拦截层，激活音频并模拟点击');
                // 启动音频保活
                startAudioKeepAlive();
                findUnityAudioContext();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(function() {});
                }

                // 获取点击坐标
                var clientX = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || window.innerWidth/2;
                var clientY = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || window.innerHeight/2;

                // 隐藏拦截层
                catcher.style.display = 'none';
                // 模拟点击 Canvas
                simulateClick(canvas, clientX, clientY);

                // 移除监听
                catcher.removeEventListener('click', handler);
                catcher.removeEventListener('touchstart', handler);
            };

            catcher.addEventListener('click', handler, { passive: false });
            catcher.addEventListener('touchstart', handler, { passive: false });
            console.log('🎯 已注册拦截层点击监听（模拟完整事件）');
        }

        // =========================================================
        // 常规事件监听
        window.addEventListener('resize', function() {
            setTimeout(window.refreshGameCanvas, 200);
        });
        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                window.refreshGameCanvas();
                setTimeout(window.refreshGameCanvas, 600);
            }, 600);
        });
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                setTimeout(window.refreshGameCanvas, 300);
            }
        });

        // =========================================================
        // 加载状态
        var statusEl = document.getElementById('loading-status');
        var fillEl = document.getElementById('progress-fill');
        var errorEl = document.getElementById('error-msg');

        if (!window.WebGLRenderingContext) {
            statusEl.innerHTML = '浏览器不支持 WebGL';
            throw new Error('No WebGL');
        }

        // =========================================================
        // 手动加载 framework.js 与 loader.js
        var frameworkLoaded = false;
        var loaderLoaded = false;

        function checkAndStart() {
            if (frameworkLoaded && loaderLoaded) {
                if (typeof unityFramework !== 'undefined' && typeof createUnityInstance !== 'undefined') {
                    console.log('✅ 依赖就绪，启动 Unity');
                    startUnity();
                } else {
                    statusEl.innerHTML = '❌ 缺少核心函数';
                }
            }
        }

        var frameworkScript = document.createElement('script');
        frameworkScript.src = buildFiles.frameworkUrl;
        frameworkScript.onload = function() { frameworkLoaded = true; checkAndStart(); };
        frameworkScript.onerror = function() { statusEl.innerHTML = '❌ framework.js 加载失败'; };
        document.head.appendChild(frameworkScript);

        var loaderScript = document.createElement('script');
        loaderScript.src = buildFiles.loaderUrl;
        loaderScript.onload = function() { loaderLoaded = true; checkAndStart(); };
        loaderScript.onerror = function() { statusEl.innerHTML = '❌ loader.js 加载失败'; };
        document.head.appendChild(loaderScript);

        // =========================================================
        // 启动 Unity
        function startUnity() {
            var config = {
                dataUrl: buildFiles.dataUrl,
                frameworkUrl: buildFiles.frameworkUrl,
                codeUrl: buildFiles.wasmUrl,
                streamingAssetsUrl: 'StreamingAssets',
                companyName: 'DefaultCompany',
                productName: 'PacBada',
                productVersion: '1.0',
                showBanner: false,
            };

            function onProgress(progress) {
                var pct = Math.min(100, Math.round(progress * 100));
                fillEl.style.width = pct + '%';
                statusEl.innerHTML = '加载中 ' + pct + '%';
                if (pct >= 100) {
                    document.getElementById('loading-area').style.display = 'none';
                }
            }

            function onSuccess(instance) {
                document.getElementById('loading-area').style.display = 'none';
                console.log('🎮 游戏启动成功');
                unityInstance = instance;

                window.refreshGameCanvas();
                startRafLoop();

                findUnityAudioContext();
                setupUserInteraction();

                setTimeout(findUnityAudioContext, 500);
                setTimeout(findUnityAudioContext, 1000);
                setTimeout(findUnityAudioContext, 2000);
            }

            function onError(err) {
                statusEl.innerHTML = '❌ 加载失败';
                errorEl.style.display = 'block';
                errorEl.innerHTML = '错误详情：<br>' + (err.message || err);
                console.error('Unity 加载错误:', err);
            }

            setTimeout(window.refreshGameCanvas, 50);
            createUnityInstance(canvas, config, onProgress).then(onSuccess).catch(onError);
        }

        setupUserInteraction();
        setTimeout(window.refreshGameCanvas, 50);
    </script>
</body>
</html>
