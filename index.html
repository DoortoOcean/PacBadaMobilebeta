<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>吃豆人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
            top: 0;
            left: 0;
        }

        #unity-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        #unity-canvas {
            display: block;
        }

        /* 加载进度条 */
        #unity-loading-bar {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        #unity-progress-bar-empty {
            width: 200px;
            height: 20px;
            background: #333333;
            border-radius: 10px;
            overflow: hidden;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #FFD700;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        #unity-loading-text {
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            font-size: 18px;
            margin-top: 15px;
        }

        /* 横屏提示 */
        #orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        #orientation-warning .icon {
            font-size: 80px;
            animation: rotate-phone 2s ease-in-out infinite;
        }

        @keyframes rotate-phone {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
        }

        #orientation-warning .text {
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            font-size: 24px;
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width="1280" height="720" tabindex="-1"></canvas>
        
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
            <div id="unity-loading-text">Loading... 0%</div>
        </div>
    </div>

    <div id="orientation-warning">
        <div class="icon">📱</div>
        <div class="text">请将手机横屏放置<br>以开始游戏</div>
    </div>

    <script>
        // ============================================
        // Canvas自适应
        // ============================================
        var unityCanvas = document.getElementById('unity-canvas');
        var TARGET_WIDTH = 1280;
        var TARGET_HEIGHT = 720;

        function resizeCanvas() {
            if (!unityCanvas) {
                unityCanvas = document.querySelector('canvas');
                if (!unityCanvas) return;
            }

            var screenWidth = window.innerWidth;
            var screenHeight = window.innerHeight;
            var scale = Math.min(screenWidth / TARGET_WIDTH, screenHeight / TARGET_HEIGHT);

            unityCanvas.style.width = Math.floor(TARGET_WIDTH * scale) + 'px';
            unityCanvas.style.height = Math.floor(TARGET_HEIGHT * scale) + 'px';
            unityCanvas.width = TARGET_WIDTH;
            unityCanvas.height = TARGET_HEIGHT;
        }

        // ============================================
        // 横屏检测
        // ============================================
        function checkOrientation() {
            var warning = document.getElementById('orientation-warning');
            if (window.innerWidth > window.innerHeight) {
                warning.style.display = 'none';
                setTimeout(resizeCanvas, 100);
            } else {
                warning.style.display = 'flex';
            }
        }

        // ============================================
        // 全局修复函数（供Unity C#调用）
        // ============================================
        window.FixCanvasSize = function() {
            resizeCanvas();
            setTimeout(resizeCanvas, 100);
            setTimeout(resizeCanvas, 300);
        };

        // ============================================
        // 监听Canvas变化
        // ============================================
        var observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'attributes' && 
                    (mutation.attributeName === 'width' || mutation.attributeName === 'height')) {
                    requestAnimationFrame(resizeCanvas);
                }
            });
        });

        if (unityCanvas) {
            observer.observe(unityCanvas, { attributes: true });
        }

        // ============================================
        // 事件监听
        // ============================================
        window.addEventListener('resize', function() {
            checkOrientation();
            resizeCanvas();
        });

        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                checkOrientation();
                resizeCanvas();
            }, 300);
        });

        // 禁止双击缩放
        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        }, { passive: false });

        // 初始检查
        checkOrientation();

        // ============================================
        // Unity加载配置 - 保持默认模板格式
        // ============================================
        var container = document.querySelector("#unity-container");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var progressText = document.querySelector("#unity-loading-text");

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
        var config = {
            dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
            frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
            codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
            #if MEMORY_FILENAME
            memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
            #endif
            #if SYMBOLS_FILENAME
            symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
            #endif
            streamingAssetsUrl: "StreamingAssets",
            companyName: "{{{ COMPANY_NAME }}}",
            productName: "{{{ PRODUCT_NAME }}}",
            productVersion: "{{{ PRODUCT_VERSION }}}",
            matchWebGLToCanvasSize: false,
            devicePixelRatio: 1
        };

        // 根据文件名自动判断加载器版本
        if (/\.loader\.js$/.test(loaderUrl)) {
            // Unity 2020.1+ 使用新的加载方式
            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = function() {
                createUnityInstance(unityCanvas, config, function(progress) {
                    var percent = Math.round(progress * 100);
                    progressBarFull.style.width = percent + '%';
                    progressText.textContent = 'Loading... ' + percent + '%';
                }).then(function(instance) {
                    loadingBar.style.display = 'none';
                    unityInstance = instance;
                    // 加载完成后修复Canvas
                    setTimeout(resizeCanvas, 200);
                    setTimeout(resizeCanvas, 500);
                }).catch(function(error) {
                    console.error('Unity加载失败:', error);
                    progressText.textContent = '加载失败，请刷新重试';
                });
            };
            document.body.appendChild(script);
        } else {
            // Unity 2019及更早版本使用UnityLoader
            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = function() {
                var gameInstance = UnityLoader.instantiate("unity-container", buildUrl + "/{{{ BUILD_FILENAME }}}", {
                    onProgress: function(gameInstance, progress) {
                        var percent = Math.round(progress * 100);
                        progressBarFull.style.width = percent + '%';
                        progressText.textContent = 'Loading... ' + percent + '%';
                    },
                    onComplete: function() {
                        loadingBar.style.display = 'none';
                        setTimeout(resizeCanvas, 200);
                        setTimeout(resizeCanvas, 500);
                    }
                });
            };
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
